<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daily Wisdom — Famous Quotes</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      padding: 24px;
    }

    header {
      text-align: center;
      margin-bottom: 40px;
    }

    header h1 {
      font-size: 1.1rem;
      font-weight: 400;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.45);
    }

    .quote-card {
      background: rgba(255, 255, 255, 0.97);
      border-radius: 20px;
      padding: 52px 56px;
      max-width: 760px;
      width: 100%;
      box-shadow: 0 32px 80px rgba(0,0,0,0.45), 0 8px 20px rgba(0,0,0,0.3);
      position: relative;
      transition: opacity 0.35s ease, transform 0.35s ease;
    }

    .quote-card.fade-out {
      opacity: 0;
      transform: translateY(8px);
    }

    .quote-mark {
      font-family: Georgia, 'Times New Roman', serif;
      font-size: 6rem;
      line-height: 0.6;
      color: #a78bfa;
      position: absolute;
      top: 32px;
      left: 44px;
      user-select: none;
      pointer-events: none;
    }

    blockquote {
      font-family: Georgia, 'Times New Roman', serif;
      font-size: 1.55rem;
      line-height: 1.65;
      color: #1a1a2e;
      margin-top: 28px;
      margin-bottom: 28px;
      font-style: italic;
      hyphens: auto;
    }

    cite {
      display: block;
      font-size: 1rem;
      font-style: normal;
      font-weight: 600;
      color: #5b21b6;
      letter-spacing: 0.04em;
    }

    cite::before { content: '— '; }

    .category-badge {
      display: inline-block;
      margin-top: 12px;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #7c3aed;
      background: #ede9fe;
      border-radius: 100px;
      padding: 3px 12px;
    }

    .actions {
      display: flex;
      gap: 12px;
      margin-top: 28px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .btn {
      border: none;
      border-radius: 100px;
      padding: 14px 32px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s, opacity 0.15s;
      letter-spacing: 0.02em;
    }

    .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(0,0,0,0.25); }
    .btn:active { transform: translateY(0); }

    .btn.primary {
      background: linear-gradient(135deg, #7c3aed, #4f46e5);
      color: #fff;
    }

    .btn.secondary {
      background: rgba(255,255,255,0.12);
      color: rgba(255,255,255,0.85);
      border: 1px solid rgba(255,255,255,0.2);
      backdrop-filter: blur(4px);
    }

    .btn.secondary:hover { background: rgba(255,255,255,0.2); }

    .toast {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: #1a1a2e;
      color: #fff;
      padding: 12px 24px;
      border-radius: 100px;
      font-size: 0.9rem;
      font-weight: 500;
      transition: transform 0.3s ease;
      pointer-events: none;
      z-index: 100;
    }

    .toast.show { transform: translateX(-50%) translateY(0); }

    footer {
      margin-top: 36px;
      font-size: 0.78rem;
      color: rgba(255,255,255,0.3);
      letter-spacing: 0.05em;
      text-align: center;
    }

    @media (max-width: 600px) {
      .quote-card { padding: 44px 28px 36px; }
      blockquote { font-size: 1.25rem; }
      .quote-mark { font-size: 4.5rem; top: 24px; left: 20px; }
    }
  </style>
</head>
<body>
  <header><h1>Daily Wisdom</h1></header>

  <div class="quote-card" id="card">
    <div class="quote-mark">"</div>
    <blockquote id="text">Loading…</blockquote>
    <cite id="author"></cite>
    <div class="category-badge" id="category"></div>
  </div>

  <div class="actions">
    <button class="btn primary" id="btnNew">New Quote</button>
    <button class="btn secondary" id="btnCopy">Copy</button>
    <button class="btn secondary" id="btnShare">Share</button>
  </div>

  <footer>
    <span id="counter"></span>
  </footer>

  <div class="toast" id="toast"></div>

  <script>
    let quotes = [];
    let lastIndex = -1;

    async function loadQuotes() {
      const res = await fetch('quotes.json');
      quotes = await res.json();
      document.getElementById('counter').textContent =
        `${quotes.length.toLocaleString()} quotes in the collection`;
      showRandom();
    }

    function pickRandom() {
      if (quotes.length === 0) return null;
      let idx;
      do { idx = Math.floor(Math.random() * quotes.length); } while (idx === lastIndex && quotes.length > 1);
      lastIndex = idx;
      return quotes[idx];
    }

    function showRandom() {
      const card = document.getElementById('card');
      const q = pickRandom();
      if (!q) return;

      card.classList.add('fade-out');
      setTimeout(() => {
        document.getElementById('text').textContent = q.text;
        document.getElementById('author').textContent = q.author;
        document.getElementById('category').textContent = q.category || '';
        card.classList.remove('fade-out');
      }, 350);
    }

    function toast(msg) {
      const el = document.getElementById('toast');
      el.textContent = msg;
      el.classList.add('show');
      setTimeout(() => el.classList.remove('show'), 2200);
    }

    document.getElementById('btnNew').addEventListener('click', showRandom);

    document.getElementById('btnCopy').addEventListener('click', () => {
      const t = document.getElementById('text').textContent;
      const a = document.getElementById('author').textContent;
      navigator.clipboard.writeText(`"${t}" — ${a}`).then(() => toast('Copied to clipboard!'));
    });

    document.getElementById('btnShare').addEventListener('click', () => {
      const t = document.getElementById('text').textContent;
      const a = document.getElementById('author').textContent;
      if (navigator.share) {
        navigator.share({ title: 'Daily Wisdom', text: `"${t}" — ${a}` }).catch(() => {});
      } else {
        navigator.clipboard.writeText(`"${t}" — ${a}`).then(() => toast('Link copied!'));
      }
    });

    document.addEventListener('keydown', e => { if (e.key === ' ' || e.key === 'ArrowRight') { e.preventDefault(); showRandom(); } });

    loadQuotes();
  </script>
</body>
</html>
