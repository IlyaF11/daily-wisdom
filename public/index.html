<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daily Wisdom — AI-Generated Quotes</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      padding: 24px;
    }

    header {
      text-align: center;
      margin-bottom: 40px;
    }

    header h1 {
      font-size: 1.1rem;
      font-weight: 400;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.45);
    }

    .quote-card {
      background: rgba(255, 255, 255, 0.97);
      border-radius: 20px;
      padding: 52px 56px;
      max-width: 760px;
      width: 100%;
      box-shadow: 0 32px 80px rgba(0,0,0,0.45), 0 8px 20px rgba(0,0,0,0.3);
      position: relative;
      transition: opacity 0.35s ease, transform 0.35s ease;
      min-height: 220px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .quote-card.fade-out {
      opacity: 0;
      transform: translateY(8px);
    }

    .quote-mark {
      font-family: Georgia, 'Times New Roman', serif;
      font-size: 6rem;
      line-height: 0.6;
      color: #a78bfa;
      position: absolute;
      top: 32px;
      left: 44px;
      user-select: none;
      pointer-events: none;
    }

    blockquote {
      font-family: Georgia, 'Times New Roman', serif;
      font-size: 1.55rem;
      line-height: 1.65;
      color: #1a1a2e;
      margin-top: 28px;
      margin-bottom: 28px;
      font-style: italic;
      hyphens: auto;
    }

    cite {
      display: block;
      font-size: 1rem;
      font-style: normal;
      font-weight: 600;
      color: #5b21b6;
      letter-spacing: 0.04em;
    }

    cite::before { content: '— '; }

    .category-badge {
      display: inline-block;
      margin-top: 12px;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #7c3aed;
      background: #ede9fe;
      border-radius: 100px;
      padding: 3px 12px;
    }

    /* Loading state */
    .loading-text {
      font-family: Georgia, 'Times New Roman', serif;
      font-size: 1.1rem;
      color: #888;
      font-style: italic;
      text-align: center;
      padding: 20px 0;
    }

    .spinner {
      display: inline-block;
      width: 18px;
      height: 18px;
      border: 2px solid #c4b5fd;
      border-top-color: #7c3aed;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .actions {
      display: flex;
      gap: 12px;
      margin-top: 28px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .btn {
      border: none;
      border-radius: 100px;
      padding: 14px 32px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s, opacity 0.15s;
      letter-spacing: 0.02em;
    }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none !important;
      box-shadow: none !important;
    }

    .btn:not(:disabled):hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(0,0,0,0.25); }
    .btn:not(:disabled):active { transform: translateY(0); }

    .btn.primary {
      background: linear-gradient(135deg, #7c3aed, #4f46e5);
      color: #fff;
    }

    .btn.secondary {
      background: rgba(255,255,255,0.12);
      color: rgba(255,255,255,0.85);
      border: 1px solid rgba(255,255,255,0.2);
      backdrop-filter: blur(4px);
    }

    .btn.secondary:not(:disabled):hover { background: rgba(255,255,255,0.2); }

    .btn.ghost {
      background: transparent;
      color: rgba(255,255,255,0.5);
      border: 1px solid rgba(255,255,255,0.12);
      font-size: 0.82rem;
      padding: 10px 22px;
    }

    .btn.ghost:not(:disabled):hover {
      color: rgba(255,255,255,0.8);
      border-color: rgba(255,255,255,0.3);
      background: rgba(255,255,255,0.06);
    }

    .toast {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: #1a1a2e;
      color: #fff;
      padding: 12px 24px;
      border-radius: 100px;
      font-size: 0.9rem;
      font-weight: 500;
      transition: transform 0.3s ease;
      pointer-events: none;
      z-index: 100;
    }

    .toast.show { transform: translateX(-50%) translateY(0); }

    footer {
      margin-top: 28px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
    }

    .progress-dots {
      display: flex;
      gap: 6px;
    }

    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: rgba(255,255,255,0.2);
      transition: background 0.2s;
      cursor: pointer;
    }

    .dot.active { background: rgba(255,255,255,0.75); }
    .dot.seen   { background: rgba(255,255,255,0.4); }

    .hint {
      font-size: 0.72rem;
      color: rgba(255,255,255,0.25);
      letter-spacing: 0.06em;
    }

    @media (max-width: 600px) {
      .quote-card { padding: 44px 28px 36px; }
      blockquote { font-size: 1.25rem; }
      .quote-mark { font-size: 4.5rem; top: 24px; left: 20px; }
    }
  </style>
</head>
<body>
  <header><h1>Daily Wisdom</h1></header>

  <div class="quote-card" id="card">
    <div class="quote-mark">"</div>
    <div class="loading-text" id="loadingMsg">
      <span class="spinner"></span>Asking Claude for wisdom…
    </div>
    <blockquote id="text" style="display:none"></blockquote>
    <cite id="author" style="display:none"></cite>
    <div class="category-badge" id="category" style="display:none"></div>
  </div>

  <div class="actions">
    <button class="btn primary" id="btnNew" disabled>Next Quote</button>
    <button class="btn secondary" id="btnCopy" disabled>Copy</button>
    <button class="btn secondary" id="btnShare" disabled>Share</button>
  </div>

  <footer>
    <div class="progress-dots" id="dots"></div>
    <button class="btn ghost" id="btnRefresh" disabled>Generate New Set</button>
    <div class="hint" id="hint">Space or → for next quote</div>
  </footer>

  <div class="toast" id="toast"></div>

  <script>
    let quotes = [];
    let currentIndex = -1;
    let isLoading = false;

    const card      = document.getElementById('card');
    const loadingMsg= document.getElementById('loadingMsg');
    const textEl    = document.getElementById('text');
    const authorEl  = document.getElementById('author');
    const categoryEl= document.getElementById('category');
    const dotsEl    = document.getElementById('dots');
    const btnNew    = document.getElementById('btnNew');
    const btnCopy   = document.getElementById('btnCopy');
    const btnShare  = document.getElementById('btnShare');
    const btnRefresh= document.getElementById('btnRefresh');

    function setLoading(on) {
      isLoading = on;
      loadingMsg.style.display = on ? 'block' : 'none';
      textEl.style.display     = on ? 'none'  : 'block';
      authorEl.style.display   = on ? 'none'  : 'block';
      categoryEl.style.display = on ? 'none'  : 'block';
      btnNew.disabled     = on || quotes.length === 0;
      btnCopy.disabled    = on || quotes.length === 0;
      btnShare.disabled   = on || quotes.length === 0;
      btnRefresh.disabled = on;
    }

    function buildDots() {
      dotsEl.innerHTML = '';
      quotes.forEach((_, i) => {
        const d = document.createElement('div');
        d.className = 'dot' + (i === currentIndex ? ' active' : i < currentIndex ? ' seen' : '');
        d.addEventListener('click', () => showAt(i));
        dotsEl.appendChild(d);
      });
    }

    function updateDots() {
      [...dotsEl.children].forEach((d, i) => {
        d.className = 'dot' + (i === currentIndex ? ' active' : i < currentIndex ? ' seen' : '');
      });
    }

    function showAt(idx) {
      if (idx < 0 || idx >= quotes.length) return;
      const q = quotes[idx];

      card.classList.add('fade-out');
      setTimeout(() => {
        currentIndex = idx;
        textEl.textContent     = q.text;
        authorEl.textContent   = q.author;
        categoryEl.textContent = q.category || '';
        updateDots();
        card.classList.remove('fade-out');
      }, 350);
    }

    function showNext() {
      if (quotes.length === 0) return;
      const next = (currentIndex + 1) % quotes.length;
      showAt(next);
    }

    async function loadQuotes() {
      setLoading(true);
      quotes = [];
      currentIndex = -1;
      dotsEl.innerHTML = '';

      try {
        const res = await fetch('/api/quotes');
        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          throw new Error(err.error || `Server error ${res.status}`);
        }
        quotes = await res.json();
        buildDots();
        setLoading(false);
        showAt(0);
      } catch (e) {
        loadingMsg.innerHTML = `<span style="color:#c53030">⚠ ${e.message}</span><br><br>
          <button class="btn primary" onclick="loadQuotes()" style="font-size:0.85rem;padding:10px 22px">Retry</button>`;
        btnRefresh.disabled = false;
        isLoading = false;
      }
    }

    function toast(msg) {
      const el = document.getElementById('toast');
      el.textContent = msg;
      el.classList.add('show');
      setTimeout(() => el.classList.remove('show'), 2200);
    }

    btnNew.addEventListener('click', showNext);

    btnCopy.addEventListener('click', () => {
      const t = textEl.textContent;
      const a = authorEl.textContent;
      navigator.clipboard.writeText(`"${t}" — ${a}`).then(() => toast('Copied to clipboard!'));
    });

    btnShare.addEventListener('click', () => {
      const t = textEl.textContent;
      const a = authorEl.textContent;
      if (navigator.share) {
        navigator.share({ title: 'Daily Wisdom', text: `"${t}" — ${a}` }).catch(() => {});
      } else {
        navigator.clipboard.writeText(`"${t}" — ${a}`).then(() => toast('Copied to clipboard!'));
      }
    });

    btnRefresh.addEventListener('click', loadQuotes);

    document.addEventListener('keydown', e => {
      if (e.key === ' ' || e.key === 'ArrowRight') { e.preventDefault(); showNext(); }
      if (e.key === 'ArrowLeft') { e.preventDefault(); showAt(currentIndex - 1); }
    });

    loadQuotes();
  </script>
</body>
</html>
